name: exam_paper_detector
description: A cross-platform exam paper question detection and box selection system based on Flutter and Rust.
version: 0.1.0
homepage: https://github.com/yourusername/exam_paper_detector

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.10.0
  ffi: ^2.1.0
  meta: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
